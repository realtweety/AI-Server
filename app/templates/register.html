<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — WilburtAI</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>body { display:block; overflow:auto; }</style>
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-mark">W</div>
    <span class="auth-logo-name">WilburtAI</span>
  </div>
  <h2>Create account</h2>
  <p class="auth-sub">Get started with your own AI workspace.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="auth-error">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.register') }}">
    <div class="auth-field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="choose a username" autocomplete="username" required autofocus>
    </div>
    <div class="auth-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
    </div>
    <div class="auth-field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="min 6 characters" autocomplete="new-password" required>
    </div>
    <button type="submit" class="auth-btn">Create account</button>
  </form>

  <p class="auth-link">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
</div>

<script>
  const t = localStorage.getItem('wilburt_theme') || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', t);
  const a = localStorage.getItem('wilburt_accent');
  if (a) { document.documentElement.style.setProperty('--accent', a); const r=parseInt(a.slice(1,3),16),g=parseInt(a.slice(3,5),16),b=parseInt(a.slice(5,7),16); document.documentElement.style.setProperty('--accent-hover',`#${[r,g,b].map(c=>Math.max(0,c-40).toString(16).padStart(2,'0')).join('')}`); }
</script>
</body>
</html>
