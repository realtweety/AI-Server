<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WilburtAI — Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { display: block; overflow: auto; padding: 0; }
        #adminShell { max-width: 860px; margin: 0 auto; padding: 32px 20px 60px; }
        .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
        .admin-header h1 { font-size: 1.4em; display: flex; align-items: center; gap: 10px; }
        .admin-header h1 span.brand { color: var(--accent); }
        .back-link { font-size: .85em; color: var(--text3); text-decoration: none; display: flex; align-items: center; gap: 5px; transition: color .15s; }
        .back-link:hover { color: var(--accent); }

        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; }
        .card h2 { font-size: 1em; font-weight: 600; margin-bottom: 16px; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; font-size: .82em; }

        /* User table */
        #userTable { width: 100%; border-collapse: collapse; font-size: .88em; }
        #userTable th { text-align: left; padding: 7px 10px; color: var(--text3); font-size: .78em; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border2); }
        #userTable td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        #userTable tr:last-child td { border-bottom: none; }
        #userTable tr:hover td { background: var(--bg3); }
        .badge-admin { background: rgba(45,125,255,.18); color: var(--accent); border-radius: 4px; padding: 2px 7px; font-size: .75em; font-weight: 600; }
        .badge-user  { background: var(--bg3); color: var(--text3); border-radius: 4px; padding: 2px 7px; font-size: .75em; }

        .tbl-actions { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-sm { padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-size: .78em; cursor: pointer; transition: background .15s, color .15s, border-color .15s; }
        .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm.danger:hover { border-color: var(--error); color: var(--error); }
        .btn-sm:disabled { opacity: .4; cursor: default; pointer-events: none; }

        /* Create user form */
        .create-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 580px) { .create-form { grid-template-columns: 1fr; } }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: .78em; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
        .form-group input { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); border-radius: 6px; padding: 8px 10px; font-family: inherit; font-size: .9em; transition: border-color .15s; }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .form-group.full { grid-column: 1 / -1; }
        .admin-checkbox-row { display: flex; align-items: center; gap: 8px; font-size: .85em; color: var(--text2); }
        .admin-checkbox-row input { accent-color: var(--accent); }
        .create-btn { padding: 9px 20px; background: var(--accent); border: none; color: white; border-radius: 6px; cursor: pointer; font-size: .9em; font-weight: 600; transition: background .15s; align-self: flex-end; }
        .create-btn:hover { background: var(--accent-hover); }

        .form-msg { font-size: .82em; padding: 8px 12px; border-radius: 6px; margin-top: 6px; }
        .form-msg.error   { background: rgba(248,113,113,.12); color: var(--error); border: 1px solid rgba(248,113,113,.3); }
        .form-msg.success { background: rgba(74,222,128,.12); color: #4ade80; border: 1px solid rgba(74,222,128,.3); }

        /* Reset password modal */
        #resetModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: center; justify-content: center; }
        #resetModal.visible { display: flex; }
        .modal-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; padding: 24px 28px; width: 340px; max-width: 94vw; }
        .modal-box h3 { font-size: 1em; margin-bottom: 16px; }
        .modal-box input { width: 100%; background: var(--bg3); color: var(--text); border: 1px solid var(--border2); border-radius: 6px; padding: 8px 10px; font-family: inherit; font-size: .9em; margin-bottom: 12px; }
        .modal-box input:focus { outline: none; border-color: var(--accent); }
        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    </style>
</head>
<body>
<div id="adminShell">
    <div class="admin-header">
        <h1><span class="brand">W</span> WilburtAI &mdash; Admin Panel</h1>
        <a class="back-link" href="/chats/">← Back to chat</a>
    </div>

    <!-- User table -->
    <div class="card">
        <h2>Users</h2>
        <table id="userTable">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Chats</th>
                    <th>Joined</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>

    <!-- Create user -->
    <div class="card">
        <h2>Create New User</h2>
        <div class="create-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="newUsername" placeholder="wilburt" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="newEmail" placeholder="user@example.com" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="newPassword" placeholder="min 6 characters">
            </div>
            <div class="form-group" style="justify-content: flex-end;">
                <label>&nbsp;</label>
                <div style="display:flex;align-items:center;gap:16px;">
                    <label class="admin-checkbox-row">
                        <input type="checkbox" id="newIsAdmin"> Make admin
                    </label>
                    <button class="create-btn" id="createUserBtn">Create</button>
                </div>
            </div>
            <div class="form-group full" id="createMsgWrap" style="display:none;">
                <div class="form-msg" id="createMsg"></div>
            </div>
        </div>
    </div>
</div>

<!-- Reset password modal -->
<div id="resetModal">
    <div class="modal-box">
        <h3>Reset Password for <span id="resetUsername"></span></h3>
        <input type="password" id="resetPasswordInput" placeholder="New password (min 6 chars)">
        <div class="modal-btns">
            <button class="btn-sm" id="resetCancelBtn">Cancel</button>
            <button class="btn-sm" id="resetConfirmBtn" style="border-color:var(--accent);color:var(--accent)">Save</button>
        </div>
    </div>
</div>

<script>
const ME = {{ current_user.id }};
let resetTargetId = null;

async function loadUsers() {
    const r = await fetch('/admin/api/users');
    const users = await r.json();
    const tbody = document.getElementById('userTableBody');
    tbody.innerHTML = '';
    users.forEach(u => {
        const tr = document.createElement('tr');
        const joined = new Date(u.created_at).toLocaleDateString();
        const isSelf = u.id === ME;
        tr.innerHTML = `
            <td><strong>${u.username}</strong>${isSelf ? ' <span style="color:var(--text4);font-size:.75em">(you)</span>' : ''}</td>
            <td style="color:var(--text3)">${u.email}</td>
            <td><span class="${u.is_admin ? 'badge-admin' : 'badge-user'}">${u.is_admin ? 'Admin' : 'User'}</span></td>
            <td style="color:var(--text3)">${u.chat_count}</td>
            <td style="color:var(--text3)">${joined}</td>
            <td>
                <div class="tbl-actions">
                    <button class="btn-sm" onclick="resetPw(${u.id},'${u.username}')" ${isSelf?'disabled':''}>Reset PW</button>
                    <button class="btn-sm" onclick="toggleAdmin(${u.id})" ${isSelf?'disabled':''}>
                        ${u.is_admin ? 'Remove admin' : 'Make admin'}
                    </button>
                    <button class="btn-sm danger" onclick="deleteUser(${u.id},'${u.username}')" ${isSelf?'disabled':''}>Delete</button>
                </div>
            </td>`;
        tbody.appendChild(tr);
    });
}

async function toggleAdmin(id) {
    await fetch(`/admin/api/users/${id}/toggle-admin`, {method:'POST'});
    loadUsers();
}

async function deleteUser(id, name) {
    if (!confirm(`Delete user "${name}" and all their chats? This cannot be undone.`)) return;
    const r = await fetch(`/admin/api/users/${id}`, {method:'DELETE'});
    const d = await r.json();
    if (r.ok) loadUsers();
    else alert(d.error);
}

function resetPw(id, name) {
    resetTargetId = id;
    document.getElementById('resetUsername').textContent = name;
    document.getElementById('resetPasswordInput').value = '';
    document.getElementById('resetModal').classList.add('visible');
    document.getElementById('resetPasswordInput').focus();
}
document.getElementById('resetCancelBtn').addEventListener('click', () => {
    document.getElementById('resetModal').classList.remove('visible');
});
document.getElementById('resetConfirmBtn').addEventListener('click', async () => {
    const pw = document.getElementById('resetPasswordInput').value.trim();
    if (!pw) return;
    const r = await fetch(`/admin/api/users/${resetTargetId}/reset-password`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({password: pw}),
    });
    const d = await r.json();
    if (r.ok) {
        document.getElementById('resetModal').classList.remove('visible');
    } else {
        alert(d.error);
    }
});

document.getElementById('createUserBtn').addEventListener('click', async () => {
    const username = document.getElementById('newUsername').value.trim();
    const email    = document.getElementById('newEmail').value.trim();
    const password = document.getElementById('newPassword').value.trim();
    const is_admin = document.getElementById('newIsAdmin').checked;
    const msgWrap  = document.getElementById('createMsgWrap');
    const msgEl    = document.getElementById('createMsg');

    const r = await fetch('/admin/api/users', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({username, email, password, is_admin}),
    });
    const d = await r.json();
    msgWrap.style.display = 'block';
    if (r.ok) {
        msgEl.className = 'form-msg success';
        msgEl.textContent = `✓ User "${d.username}" created successfully.`;
        document.getElementById('newUsername').value = '';
        document.getElementById('newEmail').value    = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('newIsAdmin').checked = false;
        loadUsers();
    } else {
        msgEl.className = 'form-msg error';
        msgEl.textContent = d.error;
    }
    setTimeout(() => { msgWrap.style.display = 'none'; }, 4000);
});

// Apply saved accent colour
const accent = localStorage.getItem('wilburt_accent');
if (accent) {
    document.documentElement.style.setProperty('--accent', accent);
    const r=parseInt(accent.slice(1,3),16),g=parseInt(accent.slice(3,5),16),b=parseInt(accent.slice(5,7),16);
    document.documentElement.style.setProperty('--accent-hover',
        `#${[r,g,b].map(c=>Math.max(0,c-40).toString(16).padStart(2,'0')).join('')}`);
}
const theme = localStorage.getItem('wilburt_theme') || 'dark';
document.documentElement.setAttribute('data-theme', theme);

loadUsers();
</script>
</body>
</html>
